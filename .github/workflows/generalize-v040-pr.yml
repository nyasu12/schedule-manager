name: Materialize Schedule Manager v0.4.0 from PR

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  materialize:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.ref == 'agent/generalize-schedule-manager'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout working branch
        uses: actions/checkout@v4
        with:
          ref: agent/generalize-schedule-manager
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install existing dependencies
        run: npm install

      - name: Rebuild exact v0.3.13 runtime sources
        run: npm run build

      - name: Reconstruct and apply v0.4.0 patch
        shell: bash
        run: |
          cat .patchpayload/patch-*.b64 | base64 --decode | gzip --decompress > /tmp/v040.patch
          git apply --check /tmp/v040.patch
          git apply /tmp/v040.patch
          rm -rf source-parts .patchpayload .materialize
          rm -f scripts/build.mjs
          rm -f .github/workflows/generalize-v040.yml
          rm -f .github/workflows/generalize-v040-pr.yml

      - name: Refresh dependency lockfile
        run: npm install

      - name: Check JavaScript syntax
        run: npm run check

      - name: Validate all migrations from a fresh database
        shell: bash
        run: |
          python3 - <<'PY'
          import sqlite3
          from pathlib import Path

          con = sqlite3.connect(':memory:')
          for path in sorted(Path('migrations').glob('*.sql')):
              con.executescript(path.read_text())
              print('applied', path.name)
          print('all migrations applied successfully')
          PY

      - name: Commit readable v0.4.0 sources
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git add -f src/index.js public/app.js
          git commit -m 'Generalize schedule manager architecture'
          git push origin HEAD:agent/generalize-schedule-manager
