name: Inspect existing v0.4.0 payload

on:
  pull_request:
    branches: [main]
    types: [synchronize, reopened]

permissions:
  contents: write

jobs:
  inspect-payload:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.ref == 'agent/generalize-schedule-manager'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout working branch
        uses: actions/checkout@v4
        with:
          ref: agent/generalize-schedule-manager
          fetch-depth: 0

      - name: Inspect existing archive once
        if: ${{ hashFiles('MATERIALIZE_DIAG.txt') == '' }}
        shell: bash
        run: |
          set -euo pipefail
          cat .materialize/payload-*.b64 | base64 --decode > /tmp/payload.zip
          {
            echo 'SHA256:'
            sha256sum /tmp/payload.zip
            echo
            echo 'ZIP TEST:'
            unzip -t /tmp/payload.zip
            echo
            echo 'ZIP CONTENTS:'
            unzip -l /tmp/payload.zip
          } > MATERIALIZE_DIAG.txt 2>&1
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add MATERIALIZE_DIAG.txt
          git commit -m 'Inspect existing materialization payload'
          git push origin HEAD:agent/generalize-schedule-manager
