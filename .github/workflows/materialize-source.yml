name: Materialize portfolio source

on:
  issues:
    types: [opened]

permissions:
  contents: write

jobs:
  materialize:
    if: github.event.issue.title == 'Materialize portfolio source'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Materialize readable sources
        run: node scripts/materialize.mjs

      - name: Commit normal source layout
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git add -f src/index.js public/app.js
          git commit -m 'Materialize portfolio source files'
          git push origin HEAD:main
