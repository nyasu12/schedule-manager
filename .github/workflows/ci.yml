name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build-and-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Rebuild runtime sources
        run: npm run build

      - name: Check Worker syntax
        run: node --check src/index.js

      - name: Check browser app syntax
        run: node --check public/app.js
